syntax = "proto3";

package recall.search.v1;

option go_package = "github.com/solodov/recall/proto/recall/search/v1;searchv1";

import "google/protobuf/timestamp.proto";

// Selector taxonomy
//
// recall names searchable surfaces with selectors. A selector is a stable,
// human-readable taxonomy value, not a provider implementation detail or a UI
// label. Selectors let recall route searches, blend and filter results, list
// what a provider can search, and choose local openers without provider-specific
// rendering code.
//
// There are two forms:
//
//   - Full recall selector: source:object:match
//   - Provider-local selector: object:match
//
// The source segment is recall-owned. It is the provider id from the operator's
// recall config, such as "backend", "gh", or "notion". Providers must not put
// that source segment in protocol fields; recall adds it when presenting or
// routing selectors. For example, a configured provider id "backend" may expose
// provider-local selector "file:content", which recall presents as full selector
// "backend:file:content".
//
// The object segment names the kind of source-native thing being searched or
// returned. It should be a durable product/domain noun, not a result-rendering
// shape. Prefer common nouns when they fit:
//
//   - file: local or repository file
//   - page: document/wiki/page-like object
//   - entry: outline, journal, or knowledge-base entry
//   - message: chat/email/message-like object
//   - event: calendar or timeline event
//   - task: task/ticket/work item
//   - issue: issue tracker issue
//   - pr: pull/merge request
//   - commit: version-control commit
//   - repo: source repository
//   - symbol: code symbol
//
// The match segment names the searchable aspect that produced the result. It
// should describe why this surface is searched differently, not every possible
// query facet. Prefer these common match names:
//
//   - content: body text, file contents, comments, descriptions, or other main
//     full-text content
//   - name: primary name/title/path/subject used to identify the object
//   - metadata: structured fields that are not the primary name or body
//   - reference: links, citations, mentions, imports, or backlinks
//
// Keep selectors coarse and stable. Query filters such as repository, author,
// status, path glob, label, language, date range, or MIME type normally belong
// in the provider's query syntax or config, not in selectors. Do not encode
// dynamic values, tenant names, repo names, local paths, transport names, output
// formats, or implementation-specific result classes in selectors.
//
// SearchSurface.selector and SearchResponse.Result.selector must be full
// provider-local selectors in object:match form. SearchRequest.selector_hints
// may contain full provider-local selectors or object prefixes to let recall ask
// for a narrower subset of a provider's surfaces. Hints are advisory
// optimization inputs: providers may use them to avoid expensive work, while
// recall still applies authoritative filtering after results are returned.
//
// Examples:
//
//   - file:name searches file paths or names
//   - file:content searches file contents
//   - page:name searches page titles
//   - page:content searches page body text
//   - entry:content searches outline or note entry text
//   - message:content searches message text
//   - event:content searches event summaries and notes
//   - issue:content searches issue titles, bodies, and comments
//   - pr:content searches pull request titles, bodies, and comments
//   - repo:name searches repository names and descriptions
//   - symbol:name searches code symbol names
//
// Structured result model
//
// Providers return provider-local Result messages. A Result separates stable
// identity from display data:
//
//   - id is provider-local machine identity and may never be shown to humans.
//   - selector identifies the provider-local surface that produced the result.
//   - fields contain typed display and machine-readable facts.
//   - format suggests which fields recall should render in human output.
//   - targets describe where the result can be opened.
//
// Field keys are stable provider-owned identifiers, preferably snake_case, such
// as ticket, summary, timestamp, line, column, snippet, status, updated_at, or
// author. Field keys must be unique within a result. Providers should use fields
// for every display fact, including file line numbers, Slack message timestamps,
// Jira ticket keys, GitHub states, and snippets. Recall may collapse whitespace
// in text fields for terminal output, but preserves the original structured
// fields in JSON.
//
// Timestamp fields are instants. Providers should populate UTC instants; recall
// renders human output in the operator's local timezone without a timezone
// suffix. JSON output preserves protobuf timestamp values.
//
// Format is a presentation hint, not a schema declaration. title_fields and
// detail_fields reference field keys. Recall skips missing or duplicated format
// keys during human rendering, falls back to available fields when format is
// absent or empty, and preserves fields not referenced by format in JSON.
//
// Open targets are for opening only. FileTarget.line and FileTarget.column are
// file open-position metadata. Display positions such as a Slack message
// timestamp, Jira updated time, GitHub authored time, ripgrep line number, or
// media timestamp should be returned as fields and selected through format when
// they should be visible. If a provider needs data to open a target, encode that
// data in the URI or file target itself rather than adding display-only data to
// OpenTarget.
//
// SearchProvider is the recall-compatible provider service. Transports bind
// these unary RPCs to stdio, gRPC, or future service transports.
service SearchProvider {
  // Search returns provider-local results ordered best-first for the query.
  // Recall derives provider-local rank from array position; providers should
  // order results by their own relevance semantics before returning them.
  rpc Search(SearchRequest) returns (SearchResponse);

  // ListCapabilities returns the provider-local search surfaces available for
  // selector discovery. It must be cheap and must not perform a remote search.
  rpc ListCapabilities(ListCapabilitiesRequest) returns (ListCapabilitiesResponse);
}

// SearchRequest is the query payload sent by recall. Source routing and
// presentation controls remain recall-owned; selector hints are provider-local
// advisory inputs so expensive providers can skip unsupported or unrequested
// surfaces while recall still applies authoritative post-filtering.
message SearchRequest {
  // Provider-native query text. Recall does not parse provider-specific query
  // operators after routing has selected a provider.
  string query = 1;

  // Optional soft maximum number of results the provider should return. When
  // absent or zero, the provider should return every reasonable match.
  optional uint32 limit = 2;

  // Optional provider-local selectors or selector prefixes the caller is
  // interested in, such as file or file:content. Providers may use these as
  // optimization hints, but every returned result must still set a full
  // provider-local selector in object:match form.
  repeated string selector_hints = 3;
}

// ListCapabilitiesRequest is empty because configured provider process args
// already select the local capability set.
message ListCapabilitiesRequest {}

// ListCapabilitiesResponse describes provider-local searchable surfaces.
message ListCapabilitiesResponse {
  // Provider-local selectors, such as file:name or page:content. Recall prefixes
  // these selectors with the configured provider id when displaying full recall
  // selectors to operators.
  repeated SearchSurface surfaces = 1;
}

// SearchSurface describes one provider-local searchable surface advertised to
// operators. A surface is a capability, not a result; it tells recall which
// selectors may be useful before a query is run.
message SearchSurface {
  // Full provider-local selector in recall's object:match taxonomy.
  string selector = 1;

  // Short human-facing label for list output. It is not used as a search result
  // title; result display data belongs in SearchResponse.Result.fields.
  string title = 2;

  // Concise explanation of what this selector searches.
  string description = 3;
}

// SearchResponse contains provider-local results and non-fatal diagnostics.
message SearchResponse {
  // Provider-local results ordered best-first. Recall derives provider-local
  // rank from array position and then blends ranks across providers.
  repeated Result results = 1;

  // Non-fatal provider diagnostics. Warnings do not invalidate successful
  // results and are preserved for machine-readable output.
  repeated Warning warnings = 2;

  // Result is one provider-local search result. Required-by-contract fields are
  // id, selector, and at least one field. Protobuf cannot express those
  // constraints directly, so recall validates them after decoding.
  message Result {
    // Provider-stable identifier, unique within this provider. This is machine
    // identity, not display text; put user-visible identifiers such as Jira keys
    // or file paths into fields when they should render.
    string id = 1;

    // Full provider-local selector in recall's object:match taxonomy. This
    // should match one of the provider's advertised SearchSurface selectors when
    // the provider can list capabilities.
    string selector = 2;

    // Typed provider-owned facts about this result. Field keys must be unique
    // within a result and should be stable snake_case names. Recall renders
    // fields selected by format and preserves all fields in JSON.
    repeated Field fields = 3;

    // Openable targets for this result, in provider-preferred order. The first
    // target is the primary terminal link when one exists; remaining targets may
    // be rendered as secondary actions.
    repeated OpenTarget targets = 4;

    // Optional provider-preferred grouping identity. Grouping is source-native
    // data, such as a file, repository, channel, project, or parent page.
    SearchGroup group = 5;

    // Optional provider-native score for diagnostics. Scores are not comparable
    // across providers and are not the primary blending signal.
    optional double score = 6;

    // Optional provider-suggested field layout for human rendering. Recall owns
    // final styling, separators, timestamp localization, and fallback behavior.
    Format format = 7;

    // Field is one typed result fact. It may be displayed in human output when
    // selected by Format, and is always preserved in JSON. Exactly one value kind
    // must be set.
    message Field {
      // Stable provider-owned field key, preferably snake_case. Examples include
      // path, line, column, snippet, ticket, summary, status, timestamp,
      // updated_at, author, repository, and url.
      string key = 1;

      oneof value {
        // Provider-normalized text. Recall may collapse whitespace for terminal
        // rendering but preserves the original value in JSON.
        string text = 2;

        // Numeric fact, such as file line, file column, count, rank, priority, or
        // sequence number. Do not encode timestamps as integers; use timestamp.
        int64 integer = 3;

        // Source-domain instant. Providers should populate UTC instants; recall
        // renders human output in the operator's local timezone without showing
        // a timezone suffix.
        google.protobuf.Timestamp timestamp = 4;
      }
    }

    // Format is a provider suggestion for generic human rendering. It references
    // Field.key values and does not declare which fields exist. Unknown or
    // missing keys are skipped. Duplicate keys are ignored after their first
    // occurrence. Fields not referenced here remain available in JSON.
    message Format {
      // Field keys that form the primary result line. If empty or if all keys
      // are missing, recall falls back to the first available field.
      repeated string title_fields = 1;

      // Field keys rendered as ordered detail rows after the title. If empty,
      // recall may render fields not used in the title as details.
      repeated string detail_fields = 2;
    }
  }

  // Warning describes non-fatal provider degradation.
  message Warning {
    // Human-readable diagnostic message.
    string message = 1;

    // Optional stable warning code for diagnostics and tests.
    optional string code = 2;
  }
}

// OpenTarget describes one action or location a result or group can open.
message OpenTarget {
  oneof target {
    UriTarget uri = 1;
    FileTarget file = 2;
  }
}

// UriTarget is a generic URI-backed open target.
message UriTarget {
  // URI to open. If the target needs source-specific coordinates such as a
  // message timestamp, encode them in this URI or permalink.
  string uri = 1;
}

// FileTarget is a local file target with an optional 1-based open position.
message FileTarget {
  // Absolute local filesystem path.
  string path = 1;

  // Optional 1-based line within the file.
  optional uint32 line = 2;

  // Optional 1-based column within line. Requires line when present.
  optional uint32 column = 3;
}

// SearchGroup describes source-native grouping without provider-specific
// renderer code in recall.
message SearchGroup {
  // Stable grouping key within the provider.
  string key = 1;

  // Human-readable group label.
  string title = 2;

  // Optional openable targets for the group. Group targets open the group
  // context, while result targets open individual results.
  repeated OpenTarget targets = 3;
}
