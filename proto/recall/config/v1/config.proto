syntax = "proto3";

package recall.config.v1;

option go_package = "github.com/solodov/recall/proto/recall/config/v1;configv1";

// RecallConfig is the operator-owned provider registry loaded by recall.
message RecallConfig {
  // Providers available to recall. Disabled providers remain configured but are
  // skipped during query fan-out.
  repeated Provider providers = 1;

  // Operator-owned commands used by recall-open for clickable result targets.
  repeated Opener openers = 2;
}

// Provider declares one searchable source and how recall can reach it. The
// SearchProvider service and method path are protocol concerns, not
// operator-owned config fields.
message Provider {
  // Operator-facing provider identifier used for routing, rendering, and
  // diagnostics.
  string id = 1;

  // Whether recall should include this provider in normal query fan-out.
  bool enabled = 2;

  // Exactly one transport must be configured.
  oneof transport {
    StdioTransport stdio = 10;
    GrpcTransport grpc = 11;
  }

  // Cross-provider ranking weight. Must be positive.
  double weight = 20;

  // Provider call timeout in milliseconds. Must be positive.
  uint32 timeout_ms = 21;

  // Default per-provider result limit. Must be positive.
  uint32 default_limit = 22;
}

// Opener maps clicked recall:// targets to local commands. Empty filter lists
// match every target for that dimension.
message Opener {
  // Operator-facing opener identifier used in diagnostics.
  string id = 1;

  // Provider IDs this opener applies to.
  repeated string sources = 2;

  // Hit kinds this opener applies to.
  repeated string kinds = 3;

  // Target types this opener applies to, currently "file" or "uri".
  repeated string target_types = 4;

  // URI schemes this opener applies to for uri targets, such as https.
  repeated string uri_schemes = 5;

  // Command to execute without a shell.
  string command = 10;

  // Static command arguments with placeholders such as {path}, {uri}, {line},
  // and {column} expanded by recall-open.
  repeated string args = 11;
}

// StdioTransport starts a provider process for one unary RPC call over stdin
// and stdout.
message StdioTransport {
  // Executable path or command name to start.
  string command = 1;

  // Static command arguments supplied after command.
  repeated string args = 2;

  // Additional environment variables supplied to the provider process.
  map<string, string> env = 3;
}

// GrpcTransport connects to a provider that exposes the recall search service
// over gRPC.
message GrpcTransport {
  // gRPC endpoint, for example dns:///source-search.internal:443.
  string endpoint = 1;
}
